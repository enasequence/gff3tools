name: Validate before merge

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Run Spotless + Tests
    runs-on: ubuntu-latest
    env:
      GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run Spotless check
        run: |
          if [ -z "$GITLAB_TOKEN" ]; then
            echo "GITLAB_TOKEN is missing"
            exit 1
          else
            echo "GITLAB_TOKEN is present"
          fi
          ./gradlew spotlessCheck "-Pgitlab_private_token=$GITLAB_TOKEN"

      - name: Run all tests
        run: |
          if [ -z "$GITLAB_TOKEN" ]; then
            echo "GITLAB_TOKEN is missing"
            exit 1
          else
            echo "GITLAB_TOKEN is present"
          fi
          ./gradlew test --info "-Pgitlab_private_token=$GITLAB_TOKEN"
